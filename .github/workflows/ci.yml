name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    env:
      COVERAGE_MIN: '15'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pip-audit coverage

      - name: Syntax check
        run: |
          python -m compileall app src ai_interface ops tools

      - name: Unit and integration tests with coverage
        run: |
          coverage run --source=app,src -m unittest discover -s tests -p "test_*.py"
          coverage xml -o coverage.xml
          coverage html -d htmlcov
          coverage report --fail-under=${COVERAGE_MIN}

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            coverage.xml
            htmlcov/
          if-no-files-found: warn

      - name: Dependency vulnerability scan
        run: |
          pip-audit -r requirements.txt

# 黄金交易系统配置

# ============================================
# 黄金ETF 518850 配置
# ============================================
etf:
  code: "518850"
  name: "黄金ETF华夏"
  
  # 交易参数
  min_amount: 100          # 最小交易单位
  take_profit: 0.01       # 止盈 1%
  stop_loss: 0.005        # 止损 0.5%
  
  # 交易时段
  trading_hours:
    morning:
      start: "09:30"
      end: "11:30"
    afternoon:
      start: "13:00"
      end: "15:00"
  
  # 收盘前清仓时间
  close_before: "14:55"

# ============================================
# 伦敦金 XAUUSD 配置
# ============================================
london_gold:
  symbol: "XAUUSD"
  name: "伦敦金/美元"
  
  # 模拟账户
  initial_balance: 100000   # 初始资金 $100,000
  
  # 策略参数
  short_ma: 5              # 短期均线
  long_ma: 20              # 长期均线
  trailing_stop: 0.02      # 追踪止损 2%
  
  # 交易成本
  spread: 0.0005           # 点差

# ============================================
# 新闻监控配置
# ============================================
news:
  # 监控源
  sources:
    - jin10              # 金十数据
    - wallstreetcn       # 华尔街见闻
    - fx678              # 汇通网
  
  # 关键词
  keywords:
    - 美联储
    - FED
    - 利率
    - 加息
    - 降息
    - 非农
    - CPI
    - 通胀
    - 黄金
    - gold
    - 美元
    - 美元指数
    - 地缘政治
    - 战争
    - 央行
  
  # 暂停交易阈值
  pause_threshold: 5       # 重要性>=5时暂停

# ============================================
# OpenClaw集成配置
# ============================================
openclaw:
  # ETF交易时段监控 (每1分钟)
  etf_interval: 60
  
  # 伦敦金监控 (每5分钟)
  london_interval: 300
  
  # 新闻检查 (每10分钟)
  news_interval: 600
  
  # 日报发送时间
  daily_report_time: "15:30"
  
  # 通知设置
  notification:
    enabled: true
    on_trade: true        # 成交通知
    on_signal: true       # 信号通知
    on_news: true         # 重要新闻通知
    on_report: true       # 日报通知
